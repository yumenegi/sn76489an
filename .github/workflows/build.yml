# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: Build Artifact for STM32F411RE

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

  workflow_dispatch:

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Development

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          ninja-build \
          gcc-arm-none-eabi

    - name: Configure CMake
      # Use the "Debug" preset to generate the build files in the build/Debug directory
      run: cmake --preset Debug -B build/Debug

    - name: Build Project
      # Run the build using the generated Ninja files
      run: cmake --build build/Debug

    - name: Upload Firmware Artifact
      # This step uploads the compiled .elf file as a downloadable artifact
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: build/Debug/${{ vars.CMAKE_PROJECT_NAME }}.elf
